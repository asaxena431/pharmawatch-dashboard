<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PharmaWatch — Narrative Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    .spinner { border: 3px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .reaction-row:hover { background: rgba(255,255,255,0.04); }
  </style>
</head>
<body class="text-slate-200 min-h-screen">

<!-- Header -->
<nav class="border-b border-slate-700/50 px-6 py-4 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="w-9 h-9 rounded-lg bg-blue-600 flex items-center justify-center">
      <i class="fa-solid fa-shield-halved text-white"></i>
    </div>
    <div>
      <h1 class="text-lg font-bold text-white">PharmaWatch</h1>
      <p class="text-xs text-slate-400">Narrative Drug Safety Analyzer</p>
    </div>
  </div>
  <div id="openaiStatus" class="text-xs px-3 py-1 rounded-full bg-slate-800 text-slate-400">Checking OpenAI...</div>
</nav>

<div class="max-w-5xl mx-auto px-6 py-10 space-y-8">

  <!-- Narrative Input -->
  <div class="glass rounded-2xl p-6">
    <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">
      <i class="fa-solid fa-file-medical-alt mr-2 text-blue-400"></i>Clinical Narrative
    </h2>
    <textarea id="narrativeInput" rows="7"
      placeholder="Paste the clinical narrative here. e.g. 'A 45-year-old male was prescribed ibuprofen 400mg and lisinopril 10mg. He developed nausea, headache, and elevated liver enzymes after 2 weeks...'"
      class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 resize-none mb-4"></textarea>
    <div class="flex items-center justify-between flex-wrap gap-3">
      <label class="flex items-center gap-2 text-sm text-slate-400 cursor-pointer">
        <input type="checkbox" id="useGpt" class="rounded accent-green-500"/>
        <i class="fa-solid fa-brain text-green-400"></i> Use GPT-4o for extraction
      </label>
      <button onclick="analyzeNarrative()"
        class="px-6 py-2.5 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-xl transition flex items-center gap-2">
        <i class="fa-solid fa-magnifying-glass"></i> Analyze Narrative
      </button>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading" class="hidden flex items-center gap-3 py-6 justify-center">
    <div class="spinner"></div>
    <span class="text-slate-400">Extracting drugs and reactions...</span>
  </div>

  <!-- Results -->
  <div id="results" class="hidden space-y-6">

    <!-- Summary cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="glass rounded-2xl p-4 text-center border-t-2 border-blue-500">
        <p class="text-2xl font-bold text-blue-400" id="sDrugs">0</p>
        <p class="text-xs text-slate-400 mt-1">Drugs Found</p>
      </div>
      <div class="glass rounded-2xl p-4 text-center border-t-2 border-purple-500">
        <p class="text-2xl font-bold text-purple-400" id="sReactions">0</p>
        <p class="text-xs text-slate-400 mt-1">Reactions Found</p>
      </div>
      <div class="glass rounded-2xl p-4 text-center border-t-2 border-green-500">
        <p class="text-2xl font-bold text-green-400" id="sInLabel">0</p>
        <p class="text-xs text-slate-400 mt-1">Found in FDA Label</p>
      </div>
      <div class="glass rounded-2xl p-4 text-center border-t-2 border-red-500">
        <p class="text-2xl font-bold text-red-400" id="sNotInLabel">0</p>
        <p class="text-xs text-slate-400 mt-1">Not in FDA Label</p>
      </div>
    </div>

    <!-- Per-drug reaction tables -->
    <div id="drugTables" class="space-y-6"></div>

    <!-- Unattributed reactions -->
    <div id="unattributedSection" class="hidden glass rounded-2xl p-6">
      <h3 class="font-semibold text-white mb-4 flex items-center gap-2">
        <i class="fa-solid fa-circle-question text-slate-400"></i> Reactions — Drug Unattributed
      </h3>
      <div id="unattributedTable"></div>
    </div>

  </div>
</div>

<script>
  function checkInLabel(reactionName, labelData) {
    if (!labelData) return { found: false, sections: [] };
    const term    = reactionName.toLowerCase();
    const arRaw   = (labelData.adverse_reactions_raw || '').toLowerCase();
    const warnObj = labelData.warnings || {};
    const warnRaw = (labelData.warnings_raw || Object.values(warnObj).join(' ')).toLowerCase();
    const words   = term.split(/\s+/).filter(w => w.length > 4);
    function matches(blob) {
      if (!blob) return false;
      if (blob.includes(term)) return true;
      if (words.length > 0 && words.every(w => blob.includes(w))) return true;
      return false;
    }
    const sections = [];
    if (matches(arRaw))   sections.push('Adverse Reactions');
    if (matches(warnRaw)) sections.push('Warning');
    return { found: sections.length > 0, sections };
  }

  function extractNarrativeSentence(narrative, reactionName) {
    if (!narrative) return '';
    const term = reactionName.toLowerCase();
    const sentences = narrative.match(/[^.!?]+[.!?]*/g) || [narrative];
    const hit = sentences.find(function(s) { return s.toLowerCase().includes(term); });
    if (!hit) return '';
    var escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    var re = new RegExp('(' + escaped + ')', 'gi');
    return hit.trim().replace(re, '<mark class="bg-yellow-800/60 text-yellow-200 rounded px-0.5">$1</mark>');
  }

  function renderReactionTable(rxList, labelData, narrative) {
    if (!rxList || !rxList.length) return '<p class="text-slate-500 italic text-sm">No reactions detected.</p>';
    let html = '<table class="w-full text-sm"><thead><tr class="text-left border-b border-slate-700 text-xs">'
      + '<th class="pb-2 pr-4 text-slate-300" style="width:40%">Narrative</th>'
      + '<th class="pb-2 pr-4 text-slate-300">Reaction</th>'
      + '<th class="pb-2 pr-4 text-slate-400">Severity</th>'
      + '<th class="pb-2 text-yellow-400"><i class="fa-solid fa-file-medical mr-1"></i>In FDA Label</th>'
      + '</tr></thead><tbody class="divide-y divide-slate-800/50">';

    rxList.forEach(function(r) {
      const chk     = checkInLabel(r.reaction, labelData);
      const inFDA   = chk.found;
      const snippet = extractNarrativeSentence(narrative, r.reaction);
      let badges = '';
      chk.sections.forEach(function(s) {
        badges += s === 'Warning'
          ? '<span class="ml-1 text-xs px-1.5 py-0.5 rounded bg-yellow-900/50 text-yellow-300">&#9888; Warning</span>'
          : '<span class="ml-1 text-xs px-1.5 py-0.5 rounded bg-blue-900/40 text-blue-300">Adverse Rxn</span>';
      });
      const notBadge = inFDA ? '' : '<span class="ml-2 text-xs px-1.5 py-0.5 rounded bg-red-900/40 text-red-400 border border-red-800/40">Not in Label</span>';
      html += '<tr class="reaction-row ' + (!inFDA ? 'bg-red-900/10' : '') + '">'
        + '<td class="py-2 pr-4 text-slate-400 text-xs leading-relaxed">' + (snippet || '<span class="text-slate-600 italic">not found in text</span>') + '</td>'
        + '<td class="py-2 pr-4 font-medium text-slate-200 capitalize">' + r.reaction + notBadge + '</td>'
        + '<td class="py-2 pr-4 text-slate-400 text-xs capitalize">' + (r.severity || '&mdash;') + '</td>'
        + '<td class="py-2">' + (inFDA ? '<span class="text-green-400 font-bold">&#10003;</span>' + badges : '<span class="text-red-400 font-bold">&#10007;</span>') + '</td>'
        + '</tr>';
    });
    html += '</tbody></table>';
    return html;
  }

  async function analyzeNarrative() {
    const narrative = document.getElementById('narrativeInput').value.trim();
    if (!narrative) { alert('Please enter a clinical narrative.'); return; }
    const useGpt = document.getElementById('useGpt').checked;

    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('results').classList.add('hidden');

    const controller = new AbortController();
    const timer = setTimeout(function() { controller.abort(); }, 60000);
    let data;
    try {
      const endpoint = useGpt ? '/api/compare-engines' : '/api/analyze-narrative';
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({narrative: narrative, drug_name: ''}),
        signal: controller.signal
      });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error('Server error ' + res.status + ': ' + txt.substring(0, 200));
      }
      data = await res.json();
    } catch(e) {
      alert('Error: ' + (e.name === 'AbortError' ? 'Request timed out.' : e.message));
      return;
    } finally {
      clearTimeout(timer);
      document.getElementById('loading').classList.add('hidden');
    }

    if (data.error) { alert('Error: ' + data.error); return; }

    const extracted = data.merged || data.extracted || {};
    const gptUsed   = useGpt && data.gpt && !data.gpt.error;
    const engine    = gptUsed ? 'GPT-4o + medspaCy' : 'medspaCy';
    const drugs     = extracted.drugs     || [];
    const reactions = extracted.reactions || [];

    // Fetch FDA labels for each unique drug
    const drugNames = [];
    drugs.forEach(function(d) {
      const n = d.name.toLowerCase();
      if (drugNames.indexOf(n) === -1) drugNames.push(n);
    });
    const labelMap = {};
    await Promise.all(drugNames.map(async function(name) {
      try {
        const r = await fetch('/api/fda-label', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({drug_name: name})
        });
        const d = await r.json();
        if (!d.error) labelMap[name] = d;
      } catch(e) {}
    }));

    // Group reactions by drug
    const byDrug = {};
    const unattributed = [];
    reactions.forEach(function(r) {
      const d = (r.drug || '').toLowerCase() || null;
      if (d) {
        if (!byDrug[d]) byDrug[d] = [];
        byDrug[d].push(r);
      } else {
        unattributed.push(r);
      }
    });

    // Count in/not-in label
    let inLabelCount = 0, notInLabelCount = 0;
    reactions.forEach(function(r) {
      const drugKey = (r.drug || '').toLowerCase() || null;
      const ldata   = drugKey ? (labelMap[drugKey] || null) : null;
      const chk     = checkInLabel(r.reaction, ldata);
      if (chk.found) inLabelCount++; else notInLabelCount++;
    });

    // Render per-drug tables
    const drugTablesEl = document.getElementById('drugTables');
    drugTablesEl.innerHTML = '';
    Object.keys(byDrug).forEach(function(drugName) {
      const rxList    = byDrug[drugName];
      const labelData = labelMap[drugName] || null;
      const hasLabel  = !!labelData;
      const drugInfo  = drugs.find(function(d) { return d.name.toLowerCase() === drugName; }) || {};

      let badges = '';
      if (drugInfo.dose)  badges += '<span class="px-2 py-1 rounded bg-slate-700 text-slate-300 text-xs">Dose: ' + drugInfo.dose + '</span>';
      if (drugInfo.route) badges += '<span class="px-2 py-1 rounded bg-slate-700 text-slate-300 text-xs">Route: ' + drugInfo.route + '</span>';
      badges += hasLabel
        ? '<span class="px-2 py-1 rounded bg-green-900/40 text-green-300 border border-green-800/40 text-xs"><i class="fa-solid fa-check mr-1"></i>FDA Label Found</span>'
        : '<span class="px-2 py-1 rounded bg-slate-700 text-slate-400 text-xs">No FDA label data</span>';

      const div = document.createElement('div');
      div.className = 'glass rounded-2xl p-6';
      div.innerHTML = '<div class="flex items-center justify-between mb-4 flex-wrap gap-2">'
        + '<h3 class="font-bold text-white text-lg flex items-center gap-2"><i class="fa-solid fa-pills text-blue-400"></i><span class="capitalize">' + drugName + '</span></h3>'
        + '<div class="flex gap-2 flex-wrap">' + badges + '</div>'
        + '</div>'
        + renderReactionTable(rxList, labelData, narrative);
      drugTablesEl.appendChild(div);
    });

    // Unattributed
    if (unattributed.length > 0) {
      document.getElementById('unattributedSection').classList.remove('hidden');
      document.getElementById('unattributedTable').innerHTML = renderReactionTable(unattributed, null, narrative);
    } else {
      document.getElementById('unattributedSection').classList.add('hidden');
    }

    // Update summary
    document.getElementById('sDrugs').textContent      = drugs.length;
    document.getElementById('sReactions').textContent  = reactions.length;
    document.getElementById('sInLabel').textContent    = inLabelCount;
    document.getElementById('sNotInLabel').textContent = notInLabelCount;
    document.getElementById('results').classList.remove('hidden');
  }

  // Check OpenAI on load
  window.addEventListener('DOMContentLoaded', async function() {
    try {
      const res  = await fetch('/api/check-openai');
      const data = await res.json();
      const el   = document.getElementById('openaiStatus');
      if (data.available) {
        el.textContent = 'GPT-4o Ready';
        el.className   = 'text-xs px-3 py-1 rounded-full bg-green-900/50 text-green-300 border border-green-800/40';
        document.getElementById('useGpt').checked = true;
      } else {
        el.textContent = 'GPT-4o Unavailable';
        el.className   = 'text-xs px-3 py-1 rounded-full bg-slate-800 text-slate-400';
      }
    } catch(e) {}
  });
</script>
</body>
</html>
